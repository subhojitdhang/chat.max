<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Workspace Terminal</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: #0f172a; color: #e2e8f0; display: flex; height: 100vh; overflow: hidden; }
        
        .app-container { display: flex; width: 100%; height: 100%; }
        
        /* Sidebar Styling */
        .sidebar { width: 320px; background: #1e293b; border-right: 1px solid #334155; display: flex; flex-direction: column; }
        .profile-card { padding: 20px; background: #0f172a; border-bottom: 1px solid #334155; position: relative; }
        .profile-card h3 { color: #38bdf8; font-size: 1.1rem; margin-bottom: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .profile-card p { font-size: 0.8rem; color: #64748b; }
        
        /* Friends Social Interaction Strip */
        .social-actions { padding: 12px 20px; border-bottom: 1px solid #334155; background: #1e293b; }
        .add-friend-form { display: flex; gap: 8px; }
        .add-friend-form input { flex: 1; padding: 6px 10px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 4px; font-size: 0.85rem; outline: none; }
        .add-friend-form input:focus { border-color: #38bdf8; }
        .add-friend-form button { padding: 6px 12px; background: #38bdf8; color: #0f172a; border: none; font-weight: bold; font-size: 0.85rem; border-radius: 4px; cursor: pointer; }
        
        .channel-list { flex: 1; overflow-y: auto; padding: 15px; }
        .list-section-title { font-size: 0.75rem; color: #64748b; margin: 15px 0 8px 0; text-transform: uppercase; letter-spacing: 0.05em; }
        
        .channel-item { padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: space-between; }
        .channel-item:hover { background: #334155; border-color: #38bdf8; }
        .channel-item.active { background: #38bdf8; color: #0f172a; font-weight: bold; border-color: #38bdf8; }
        .channel-item.active .uid-badge { background: rgba(0, 0, 0, 0.15); color: #0f172a; }
        .uid-badge { font-size: 0.7rem; background: #0f172a; color: #94a3b8; padding: 2px 6px; border-radius: 4px; font-weight: normal; }
        
        .footer-buttons { border-top: 1px solid #334155; background: #0f172a; }
        .admin-nav-btn { width: 100%; padding: 12px; background: #f59e0b; color: #0f172a; border: none; font-weight: bold; cursor: pointer; display: none; text-align: center; text-decoration: none; font-size: 0.95rem; }
        .logout-btn { width: 100%; padding: 12px; background: #ef4444; color: white; border: none; cursor: pointer; font-weight: bold; font-size: 0.95rem; }

        /* Core Conversation Workspace */
        .chat-panel { flex: 1; display: flex; flex-direction: column; background: #0f172a; }
        .chat-header { padding: 20px; background: #1e293b; border-bottom: 1px solid #334155; display: flex; justify-content: space-between; align-items: center; }
        .chat-header h2 { font-size: 1.3rem; color: #f8fafc; }
        .crypto-status { color: #64748b; font-size: 0.85rem; display: flex; align-items: center; gap: 6px; }
        
        .chat-history { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
        .msg-row { display: flex; flex-direction: column; background: #1e293b; border: 1px solid #334155; padding: 12px 16px; border-radius: 8px; max-width: 75%; width: fit-content; }
        .msg-meta { font-size: 0.75rem; color: #38bdf8; font-weight: bold; margin-bottom: 4px; }
        .msg-body { font-size: 0.95rem; line-height: 1.4; white-space: pre-wrap; word-break: break-word; }
        .msg-image { margin-top: 8px; max-width: 100%; max-height: 250px; border-radius: 6px; border: 1px solid #334155; display: block; }
        
        /* Input Deck & Image Attachment Hub */
        .input-deck { padding: 20px; background: #1e293b; border-top: 1px solid #334155; }
        .preview-bar { display: none; align-items: center; justify-content: space-between; background: #0f172a; padding: 8px 12px; border-radius: 6px; margin-bottom: 12px; border: 1px solid #334155; }
        .preview-title { font-size: 0.85rem; color: #a1a1aa; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 80%; }
        .preview-remove { color: #ef4444; font-weight: bold; cursor: pointer; font-size: 0.85rem; }
        
        .input-form { display: flex; gap: 10px; align-items: center; }
        .input-form input[type="text"] { flex: 1; padding: 12px; background: #0f172a; border: 1px solid #334155; color: white; border-radius: 6px; outline: none; font-size: 1rem; }
        .input-form input[type="text"]:focus { border-color: #38bdf8; }
        
        .attach-btn { padding: 12px; background: #475569; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 0.95rem; display: flex; align-items: center; justify-content: center; width: 45px; }
        .transmit-btn { padding: 12px 24px; background: #38bdf8; color: #0f172a; border: none; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="sidebar">
            <div class="profile-card">
                <h3 id="lblDisplayName">Loading...</h3>
                <p id="lblSubHeader">Session Secure</p>
            </div>
            
            <div class="social-actions" id="friendActionPanel">
                <div class="add-friend-form">
                    <input type="text" id="txtFriendSearch" placeholder="Friend ID or Username" autocomplete="off">
                    <button id="btnAddFriend">Add</button>
                </div>
            </div>
            
            <div class="channel-list">
                <div class="list-section-title">Global Arena</div>
                <div id="btnGlobalRoom" class="channel-item active">
                    <span>🌐 Public Network Core</span>
                </div>
                
                <div class="list-section-title" id="lblFriendTitle">Direct Encrypted Lines</div>
                <div id="friendContainer"></div>
            </div>

            <div class="footer-buttons">
                <a href="admin.html" id="lnkAdminPanel" class="admin-nav-btn">🛠️ GO TO ADMIN CONTROL</a>
                <button id="btnDisconnect" class="logout-btn">DISCONNECT TERMINAL</button>
            </div>
        </div>

        <div class="chat-panel">
            <div class="chat-header">
                <h2 id="lblChatHeader">🌐 Public Network Core</h2>
                <div class="crypto-status">
                    <span style="color: #4ade80;">●</span> Live Session Connection
                </div>
            </div>
            
            <div class="chat-history" id="chatScrollArea"></div>
            
            <div class="input-deck">
                <div class="preview-bar" id="imgPreviewContainer">
                    <span class="preview-title" id="lblPreviewName">image.png attached</span>
                    <span class="preview-remove" id="btnRemoveAttachment">Remove</span>
                </div>
                
                <div id="typing-indicator" style="color: gray; font-size: 12px; height: 15px; margin-left: 10px; font-style: italic;"></div>
                
                <form id="frmTransmitter" class="input-form">
                    <input type="file" id="fileImageInput" accept="image/*" style="display: none;">
                    <button type="button" class="attach-btn" id="btnTriggerFile" title="Attach maximum 1 image file">📷</button>
                    
                    <input type="text" id="txtMessageInput" placeholder="Send an encrypted transmission..." autocomplete="off" required>
                    <button type="submit" class="transmit-btn">SEND</button>
                </form>
            </div>
        </div>
    </div>

    <script src="/js/app.js"></script>
</body>
</html>
